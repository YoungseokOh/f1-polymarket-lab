name: ci

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Biome lint & format
        run: pnpm lint

      - name: TypeScript typecheck
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: f1_polymarket_lab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d f1_polymarket_lab_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_POSTGRES_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/f1_polymarket_lab_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Python tests
        run: uv run pytest py/tests/ -q

      - name: JS tests
        run: pnpm test
