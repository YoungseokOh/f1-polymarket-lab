services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env before running make infra-up}
      POSTGRES_DB: ${POSTGRES_DB:-f1_polymarket_lab}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.3
    command: mlflow server --host 0.0.0.0 --port 5001
    ports:
      - "5001:5001"

volumes:
  postgres_data:
